<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>unSpootify Download Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <img src="unSpootify.png" alt="Header Photo" class="header-photo">
        </div>
    </header>

    <div class="grid-container">
        <div class="grid-item input-group">
            <label for="username">Soulseek Username:</label>
            <input type="text" id="username" placeholder="Enter your username">
        </div>

        <div class="grid-item input-group">
            <label for="password">Soulseek Password:</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>

        <div class="grid-item input-group">
            <label for="folderPath">Download Folder:</label>
            <input type="text" id="folderPath" placeholder="Enter absolute path to download folder">
        </div>

        <div class="grid-item input-group">
            <label for="playlistURL">Spotify Playlist URL:</label>
            <input type="text" id="playlistURL" placeholder="Paste Spotify playlist URL here">
        </div>

        <div class="grid-item">
            <h3>Basic Options</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Option Name</th>
                            <th>User Input</th>
                            <th>Description</th>
                            <th>Toggle</th>
                        </tr>
                    </thead>
                    <tbody id="basicOptionsTable"></tbody>
                </table>
            </div>
        </div>

        <div class="grid-item">
            <h3><button id="toggleAdvancedOptions" class="toggle-advanced">Show Advanced Options</button></h3>
            <div id="advancedOptionsContainer" class="table-container hidden">
                <table>
                    <thead>
                        <tr>
                            <th>Option Name</th>
                            <th>User Input</th>
                            <th>Description</th>
                            <th>Toggle</th>
                        </tr>
                    </thead>
                    <tbody id="advancedOptionsTable"></tbody>
                </table>
            </div>
        </div>

        <div class="grid-item">
            <button id="downloadButton" class="submit-button">Download</button>
        </div>

        <div class="grid-item mock-terminal" id="mockTerminal"></div>
    </div>

    <div class="footer">
        &copy; 2000 - 2005 unSpootify Playlist Viewer. All Rights Reserved.
    </div>

    <script src="script.js"></script>
</body>
</html>
